<!-- New Order Modal -->
<div id="order-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeOrderModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 overflow-y-auto">
        <div class="glass rounded-3xl p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative">
            <button onclick="closeOrderModal()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <h3 class="font-display text-2xl font-bold mb-6">Create New Order</h3>
            
            <form id="order-form" onsubmit="saveOrder(event)" class="space-y-6">
                <!-- Customer Info -->
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Customer Name *</label>
                        <input type="text" id="order-customer-name" required class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email *</label>
                        <input type="email" id="order-customer-email" required class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="customer@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">WhatsApp</label>
                        <input type="text" id="order-customer-whatsapp" class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="+6281234567890">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Voucher Code</label>
                        <div class="flex gap-2">
                            <input type="text" id="order-voucher" class="input-field flex-1 px-4 py-3 rounded-xl text-white uppercase" placeholder="e.g., VOTE10">
                            <button type="button" onclick="applyVoucher()" class="px-4 py-3 rounded-xl bg-primary/20 text-primary hover:bg-primary/30 transition text-sm font-medium">Apply</button>
                        </div>
                        <p id="voucher-message" class="text-xs mt-1"></p>
                    </div>
                </div>

                <!-- Products Selection -->
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-medium text-gray-300">Select Products *</label>
                        <button type="button" onclick="addProductRow()" class="text-primary text-sm hover:text-secondary transition">
                            <i class="fa-solid fa-plus mr-1"></i>Add Product
                        </button>
                    </div>
                    <div id="order-products-container" class="space-y-3">
                        <!-- Product rows will be added here -->
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="glass rounded-xl p-4 border border-white/10">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-400">Subtotal</span>
                        <span id="order-subtotal" class="font-bold">Rp0</span>
                    </div>
                    <div class="flex justify-between items-center mb-2 text-green-400">
                        <span>Discount</span>
                        <span id="order-discount">-Rp0</span>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-white/10">
                        <span class="text-lg font-bold">Total</span>
                        <span id="order-total" class="text-2xl font-bold text-primary">Rp0</span>
                    </div>
                </div>

                <!-- Payment Method -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Payment Method *</label>
                    <select id="order-payment-method" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                        <option value="">Select payment method</option>
                        <option value="BCA">BCA Transfer</option>
                        <option value="BRI">BRI Transfer</option>
                        <option value="Dana">Dana</option>
                    </select>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Notes</label>
                    <textarea id="order-notes" rows="3" class="input-field w-full px-4 py-3 rounded-xl text-white resize-none" placeholder="Any special requests..."></textarea>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeOrderModal()" class="flex-1 py-3 rounded-xl bg-white/10 hover:bg-white/20 font-medium transition">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-primary to-secondary font-bold hover:shadow-lg transition">Create Order</button>
                </div>
            </form>
        </div>
    </div>
</div>
