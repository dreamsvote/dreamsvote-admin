<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamsVote | Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] },
                    colors: { 
                        primary: '#8A2A2B',
                        'primary-hover': '#702223',
                        'primary-light': 'rgba(138, 42, 43, 0.05)',
                        surface: '#FFFFFF',
                        background: '#F8FAFC',
                        border: '#E2E8F0',
                        'text-main': '#1E293B',
                        'text-muted': '#64748B'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="products.css">
</head>
<body class="bg-background text-text-main min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 bg-surface border-r border-border fixed h-full z-40 hidden lg:flex flex-col">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                    <i data-lucide="vote" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-display font-bold text-xl tracking-tight text-primary">DreamsVote</h1>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted">Admin Console</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto custom-scrollbar">
            <div class="px-4 py-2 text-[11px] font-bold text-text-muted uppercase tracking-wider">Main Menu</div>
            <a href="dashboard.html" id="nav-dashboard" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
            </a>
            <a href="products.html" id="nav-products" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="package" class="w-5 h-5"></i><span>Products</span>
            </a>
            <a href="vouchers.html" id="nav-vouchers" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="ticket" class="w-5 h-5"></i><span>Vouchers</span>
            </a>
            
            <div class="px-4 py-6 text-[11px] font-bold text-text-muted uppercase tracking-wider">Management</div>
            <a href="orders.html" id="nav-orders" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i><span>Orders</span>
            </a>
            <a href="schedule.html" id="nav-schedule" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="calendar" class="w-5 h-5"></i><span>Schedule</span>
            </a>
            <a href="customers.html" id="nav-customers" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl">
                <i data-lucide="users" class="w-5 h-5"></i><span>Customers</span>
            </a>
        </nav>

        <div class="p-6 border-t border-border bg-background/50">
            <button onclick="logout()" class="w-full py-2.5 rounded-xl bg-white border border-border text-red-600 hover:bg-red-50 hover:border-red-100 transition-all text-sm font-semibold flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i>Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-72 transition-all duration-300">
        <!-- Top Header -->
        <header class="h-20 bg-surface/80 backdrop-blur-md border-b border-border sticky top-0 z-30 px-8 flex items-center justify-between">
            <div class="hidden lg:flex items-center gap-2 text-sm text-text-muted">
                <span>Pages</span>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                <span class="text-text-main font-medium">Products</span>
            </div>

            <button onclick="openProductModal()" class="btn-primary px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-primary/20">
                <i data-lucide="plus" class="w-4 h-4"></i>Add New Product
            </button>
        </header>

        <div class="p-8 fade-in">
            <div class="mb-10">
                <h2 class="font-display text-3xl font-bold text-text-main tracking-tight mb-2">Product Inventory</h2>
                <p class="text-text-muted">Manage your voting packages and global pricing.</p>
            </div>

            <!-- Filters -->
            <div class="flex flex-col md:flex-row gap-4 mb-8 justify-between items-center">
                <div class="flex bg-white p-1 rounded-xl border border-border">
                    <button onclick="filterProducts('all')" class="px-6 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white" id="filter-all">All</button>
                    <button onclick="filterProducts('active')" class="px-6 py-2 rounded-lg text-sm font-bold text-text-muted hover:text-primary transition-all" id="filter-active">Active</button>
                    <button onclick="filterProducts('low')" class="px-6 py-2 rounded-lg text-sm font-bold text-text-muted hover:text-primary transition-all" id="filter-low">Low Stock</button>
                </div>
                <div class="relative w-full md:w-80">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted"></i>
                    <input type="text" id="search-input" placeholder="Search products..." class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-sm">
                </div>
            </div>

            <!-- Products Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="products-grid">
                <!-- Dynamic content -->
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-text-main/20 backdrop-blur-sm" onclick="closeProductModal()"></div>
        <div class="absolute inset-y-0 right-0 max-w-xl w-full bg-surface shadow-2xl flex flex-col fade-in">
            <div class="p-8 border-b border-border flex justify-between items-center">
                <h3 class="font-display text-2xl font-bold text-text-main" id="modal-title">Add Product</h3>
                <button onclick="closeProductModal()" class="w-10 h-10 rounded-xl hover:bg-background flex items-center justify-center transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-text-muted"></i>
                </button>
            </div>
            
            <form id="product-form" onsubmit="saveProduct(event)" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
                <div class="space-y-6">
                    <p class="text-[11px] font-bold text-primary uppercase tracking-widest">Basic Information</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-text-muted uppercase mb-2">Product Name</label>
                            <input type="text" id="product-name" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="e.g., UPICK Jam Package">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-text-muted uppercase mb-2">App Platform</label>
                                <select id="product-app" required class="input-field w-full px-4 py-3 rounded-xl appearance-none">
                                    <option value="UPICK">UPICK</option>
                                    <option value="MY1PICK">MY1PICK</option>
                                    <option value="IDOLCHAMP">IDOLCHAMP</option>
                                    <option value="FREEVOTE">FREEVOTE</option>
                                    <option value="MUBEAT">MUBEAT</option>
                                    <option value="STARPLANET">STARPLANET</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-text-muted uppercase mb-2">Vote Type</label>
                                <input type="text" id="product-type" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="e.g., Blue Jam">
                            </div>
                        </div>
                    </div>

                    <p class="text-[11px] font-bold text-primary uppercase tracking-widest pt-4">Pricing & Stock</p>
                    <div class="bg-background/50 p-6 rounded-2xl border border-border space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-text-muted uppercase mb-2">Amount (Number of Votes)</label>
                            <input type="number" id="product-amount" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="e.g., 10000">
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-text-muted uppercase mb-2">Price ($ USD)</label>
                                <input type="number" id="price-usd" step="0.01" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="1.00">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-text-muted uppercase mb-2">Price (Rp IDR)</label>
                                <input type="number" id="price-idr" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="16000">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-text-muted uppercase mb-2">Price (₱ PHP)</label>
                                <input type="number" id="price-php" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="60">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-text-muted uppercase mb-2">Total Stock</label>
                            <input type="number" id="product-stock" required class="input-field w-full px-4 py-3 rounded-xl" placeholder="Available supply">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-text-muted uppercase mb-4">Status</label>
                        <div class="flex gap-4">
                            <label class="flex-1 relative cursor-pointer group">
                                <input type="radio" name="status" value="active" checked class="peer sr-only">
                                <div class="p-4 rounded-xl border border-border bg-white text-center font-bold text-sm peer-checked:border-primary peer-checked:text-primary peer-checked:bg-primary-light transition-all">Active</div>
                            </label>
                            <label class="flex-1 relative cursor-pointer group">
                                <input type="radio" name="status" value="inactive" class="peer sr-only">
                                <div class="p-4 rounded-xl border border-border bg-white text-center font-bold text-sm peer-checked:border-primary peer-checked:text-primary peer-checked:bg-primary-light transition-all">Inactive</div>
                            </label>
                        </div>
                    </div>
                </div>
            </form>

            <div class="p-8 border-t border-border bg-background/50 flex gap-4">
                <button type="button" onclick="closeProductModal()" class="flex-1 py-4 rounded-xl border border-border font-bold text-text-muted hover:bg-white transition-colors">Cancel</button>
                <button type="submit" form="product-form" class="flex-[2] btn-primary py-4 rounded-xl font-bold shadow-lg shadow-primary/20">Save Product</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 px-6 py-4 rounded-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-500 z-50">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
            <i data-lucide="check" class="text-white w-4 h-4"></i>
        </div>
        <span id="toast-message" class="font-bold text-sm">Operation successful</span>
    </div>

    <script type="module" src="shared.js"></script>
    <script type="module" src="products.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
