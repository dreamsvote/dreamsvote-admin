<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamsVote | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        primary: '#8B5CF6',
                        secondary: '#EC4899',
                        dark: '#0F172A',
                        darker: '#020617',
                        surface: '#1E293B'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="login.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-darker">

    <!-- Background blobs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-96 h-96 bg-primary/20 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-secondary/20 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
    </div>

    <div class="glass rounded-3xl p-8 w-full max-w-md relative z-10 m-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-2xl font-bold shadow-lg shadow-primary/25">
                DV
            </div>
            <h1 class="font-display text-3xl font-bold mb-2">DreamsVote</h1>
            <p class="text-gray-400">Admin Panel</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="username" required
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Enter username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Enter password">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="rounded bg-surface border-gray-600 text-primary focus:ring-primary">
                    <span class="text-gray-400">Remember me</span>
                </label>
                <a href="#" class="text-primary hover:text-secondary transition">Forgot password?</a>
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary to-secondary rounded-xl font-bold text-lg hover:shadow-lg hover:shadow-primary/25 transition transform hover:-translate-y-0.5">
                Sign In <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <p>Default: admin / admin123</p>
        </div>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-8 right-8 glass-toast px-6 py-4 rounded-xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
            <i class="fa-solid fa-circle-xmark text-red-400 text-xl"></i>
            <span id="toast-message" class="font-medium">Invalid credentials!</span>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
