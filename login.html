<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamsVote | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] },
                    colors: { 
                        primary: '#8A2A2B',
                        'primary-hover': '#702223',
                        'primary-light': 'rgba(138, 42, 43, 0.05)',
                        surface: '#FFFFFF',
                        background: '#F8FAFC',
                        border: '#E2E8F0',
                        'text-main': '#1E293B',
                        'text-muted': '#64748B'
                    }
                }
            }
        }
    </script>
    <style>
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(138, 42, 43, 0.15);
        }
        .input-field {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #8A2A2B;
            box-shadow: 0 0 0 4px rgba(138, 42, 43, 0.05);
            outline: none;
        }
        .btn-primary {
            background: #8A2A2B;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #702223;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(138, 42, 43, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    
    <!-- Abstract Background Elements -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md fade-in">
        <div class="text-center mb-10">
            <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center shadow-2xl shadow-primary/30 mx-auto mb-6">
                <i data-lucide="vote" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="font-display text-3xl font-bold text-text-main tracking-tight">Welcome Back</h1>
            <p class="text-text-muted mt-2">Sign in to manage your DreamsVote admin panel.</p>
        </div>

        <div class="login-card p-10 rounded-[2rem]">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[11px] font-bold text-text-muted uppercase tracking-widest mb-3">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-muted"></i>
                        <input type="email" id="email" required class="input-field w-full pl-12 pr-4 py-4 rounded-2xl text-sm font-medium" placeholder="admin@dreamsvote.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-[11px] font-bold text-text-muted uppercase tracking-widest">Password</label>
                        <a href="#" class="text-[10px] font-bold text-primary hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-muted"></i>
                        <input type="password" id="password" required class="input-field w-full pl-12 pr-4 py-4 rounded-2xl text-sm font-medium" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="remember" class="w-5 h-5 rounded border-border text-primary focus:ring-primary/20">
                    <label for="remember" class="text-xs font-semibold text-text-muted cursor-pointer">Remember me for 30 days</label>
                </div>

                <button type="submit" id="login-btn" class="btn-primary w-full py-4 rounded-2xl font-bold text-sm shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span>Sign In to Console</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-text-muted mt-8 font-medium">
            DreamsVote &copy; 2026 Admin Portal. All rights reserved.
        </p>
    </div>

    <script src="shared.js"></script>
    <script type="module" src="login.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
