<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamsVote | Customers</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Space Grotesk','sans-serif'] },
                    colors: { primary:'#8B5CF6', secondary:'#EC4899', accent:'#3B82F6', dark:'#0F172A', darker:'#020617', surface:'#1E293B' }
                }
            }
        }
    <\/script>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="customers.css">
</head>
<body class="min-h-screen flex">
    <aside class="w-64 glass border-r border-white/10 fixed h-full z-40 hidden md:flex flex-col">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center font-bold shadow-lg">DV</div>
                <div><h1 class="font-display font-bold text-lg">DreamsVote</h1><p class="text-xs text-gray-400">Admin Panel</p></div>
            </div>
        </div>
        <nav class="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar">
            <a href="dashboard.html" id="nav-dashboard" class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-chart-line w-5"></i><span>Dashboard</span></a>
            <a href="products.html"  id="nav-products"  class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-box w-5"></i><span>Products</span></a>
            <a href="vouchers.html"  id="nav-vouchers"  class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-ticket w-5"></i><span>Vouchers</span></a>
            <a href="orders.html"    id="nav-orders"    class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-shopping-cart w-5"></i><span>Orders</span></a>
            <a href="schedule.html" id="nav-schedule" class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-calendar-days w-5"></i><span>Schedule</span></a>
            <a href="customers.html" id="nav-customers" class="sidebar-link flex items-center gap-3 px-6 py-3 text-gray-300 hover:text-white"><i class="fa-solid fa-users w-5"></i><span>Customers</span></a>
        </nav>
        <div class="p-6 border-t border-white/10">
            <div class="flex items-center gap-3 mb-4">
                <img src="https://ui-avatars.com/api/?name=Admin&background=8B5CF6&color=fff" class="w-10 h-10 rounded-full">
                <div><p class="font-medium text-sm">Administrator</p><p class="text-xs text-gray-400">admin@dreamsvote.com</p></div>
            </div>
            <button onclick="logout()" class="w-full py-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 transition text-sm font-medium">
                <i class="fa-solid fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </aside>
    <div class="md:hidden fixed top-0 w-full glass border-b border-white/10 z-30 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center font-bold text-sm">DV</div>
            <span class="font-display font-bold">DreamsVote</span>
        </div>
        <button onclick="toggleMobileMenu()" class="p-2"><i class="fa-solid fa-bars text-xl"></i></button>
    </div>
    <div id="mobile-menu" class="fixed inset-0 z-40 bg-darker/95 backdrop-blur-lg hidden md:hidden pt-16">
        <div class="p-4 space-y-2">
            <a href="dashboard.html" class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Dashboard</a>
            <a href="products.html"  class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Products</a>
            <a href="vouchers.html"  class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Vouchers</a>
            <a href="orders.html"    class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Orders</a>
            <a href="schedule.html" class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Schedule</a>
            <a href="customers.html" class="block p-4 rounded-xl bg-white/5 hover:bg-white/10">Customers</a>
            <button onclick="logout()" class="w-full p-4 rounded-xl bg-red-500/10 text-red-400 text-left">Logout</button>
        </div>
    </div>
    <main class="flex-1 md:ml-64 pt-16 md:pt-0">
        <div class="p-6 md:p-8 fade-in">
            <h2 class="font-display text-3xl font-bold mb-6">Customer Management</h2>
            <div class="glass rounded-2xl p-12 text-center border border-white/5">
                <i class="fa-solid fa-users text-6xl text-gray-600 mb-4"></i>
                <p class="text-gray-400">Customer management interface would go here</p>
            </div>
        </div>
    </main>
    <div id="toast" class="fixed bottom-8 right-8 glass px-6 py-4 rounded-xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <i class="fa-solid fa-check-circle text-primary text-xl"></i>
        <span id="toast-message" class="font-medium"></span>
    </div>
    <script src="shared.js"><\/script>
</body>
</html>
